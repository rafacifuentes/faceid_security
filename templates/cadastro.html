<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Cadastro Facial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <div class="card bg-black border border-secondary shadow-lg">

        <div class="card-body p-5">

            <h1 class="fw-bold mb-4">

                📷 Cadastro Facial

            </h1>

            <form method="POST"
                  enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        ID
                    </label>

                    <input type="number"
                           name="id"
                           class="form-control bg-dark text-light border-secondary"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Nome
                    </label>

                    <input type="text"
                           name="nome"
                           class="form-control bg-dark text-light border-secondary"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        CPF
                    </label>

                    <input type="text"
                           name="cpf"
                           class="form-control bg-dark text-light border-secondary"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Foto
                    </label>

                    <input type="file"
                           name="foto"
                           class="form-control bg-dark text-light border-secondary"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-primary btn-lg w-100">

                    Salvar Cadastro

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
